  /summary/{assignmentId}:
    get:
      summary: Get assignment summary
      description: Returns a summary report for a specific assignment, including total students, average score, score distribution, and question performance.
      parameters:
        - name: assignmentId
          in: path
          required: true
          description: The ID of the assignment to fetch the summary for.
          schema:
            type: string
      responses:
        '200':
          description: A summary report for the assignment.
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignment_id:
                    type: string
                    example: "67c9b351eadaa5ea8ea30988"
                  title:
                    type: string
                    example: "Math Assignment 1"
                  total_students:
                    type: integer
                    example: 50
                  average_score:
                    type: number
                    format: float
                    example: 75.5
                  score_distribution:
                    type: object
                    properties:
                      '0-20':
                        type: integer
                        example: 2
                      '21-40':
                        type: integer
                        example: 5
                      '41-60':
                        type: integer
                        example: 10
                      '61-80':
                        type: integer
                        example: 20
                      '81-100':
                        type: integer
                        example: 13
                  question_performance:
                    type: array
                    items:
                      type: object
                      properties:
                        question_id:
                          type: string
                          example: "67890"
                        question:
                          type: string
                          example: "What is 2 + 2?"
                        average_marks:
                          type: number
                          format: float
                          example: 4.5
        '404':
          description: Assignment not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Assignment not found"
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Error generating summary report"




components:
  schemas:
    Course:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the course
        title:
          type: string
          description: Title of the course
        description:
          type: string
          description: Brief course description
        tags:
          type: array
          items:
            type: string
          description: Tags associated with the course
        professor:
          type: string
          description: Name of the professor teaching the course
        image:
          type: string
          description: URL of the course image
        createdAt:
          type: string
          format: date-time
          description: Timestamp of course creation
        updatedAt:
          type: string
          format: date-time
          description: Timestamp of last update

    CourseInput:
      type: object
      required:
        - title
        - description
        - professor
        - image
      properties:
        title:
          type: string
          description: Title of the course
        description:
          type: string
          description: Brief course description
        tags:
          type: array
          items:
            type: string
          description: Tags associated with the course
        professor:
          type: string
          description: Name of the professor teaching the course
        image:
          type: string
          description: URL of the course image




    Task:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the task
        name:
          type: string
          description: Name of the task
        subject:
          type: string
          description: Subject of the task
        deadline:
          type: string
          format: date-time
          description: Deadline for the task
        priority:
          type: string
          enum: [High, Medium, Low]
          description: Priority level of the task
        createdAt:
          type: string
          format: date-time
          description: Timestamp of task creation
        updatedAt:
          type: string
          format: date-time
          description: Timestamp of last update

    TaskInput:
      type: object
      required:
        - name
        - subject
        - deadline
      properties:
        name:
          type: string
          description: Name of the task
        subject:
          type: string
          description: Subject of the task
        deadline:
          type: string
          format: date-time
          description: Deadline for the task
        priority:
          type: string
          enum: [High, Medium, Low]
          description: Priority level of the task





    Lecture:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the lecture
        course:
          type: string
          description: Name of the course
        week:
          type: integer
          description: Week number
        lectureNumber:
          type: integer
          description: Lecture number within the week
        title:
          type: string
          description: Title of the lecture
        description:
          type: string
          description: Brief description of the lecture
        videoUrl:
          type: string
          description: URL of the lecture video
        createdAt:
          type: string
          format: date-time
          description: Timestamp of lecture creation
        updatedAt:
          type: string
          format: date-time
          description: Timestamp of last update

    LectureInput:
      type: object
      required:
        - course
        - week
        - lectureNumber
        - title
        - description
      properties:
        course:
          type: string
          description: Name of the course
        week:
          type: integer
          description: Week number
        lectureNumber:
          type: integer
          description: Lecture number within the week
        title:
          type: string
          description: Title of the lecture
        description:
          type: string
          description: Brief description of the lecture
        videoUrl:
          type: string
          description: URL of the lecture video (optional)






    Week:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the week
        courseId:
          type: string
          description: ID of the course this week belongs to
        weekNumber:
          type: number
          description: The week number within the course
        title:
          type: string
          description: Title of the week
        description:
          type: string
          description: Description of the week
        lecture:
          type: array
          items:
            type: string
          description: List of lecture IDs associated with the week
        createdAt:
          type: string
          format: date-time
          description: Timestamp of week creation
        updatedAt:
          type: string
          format: date-time
          description: Timestamp of last update

    WeekInput:
      type: object
      required:
        - courseId
        - weekNumber
        - title
      properties:
        courseId:
          type: string
          description: ID of the course this week belongs to
        weekNumber:
          type: number
          description: The week number within the course
        title:
          type: string
          description: Title of the week
        description:
          type: string
          description: Description of the week
        lecture:
          type: array
          items:
            type: string
          description: List of lecture IDs associated with the week



    Feedback:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
          description: Unique identifier for the user
        course_id:
          type: string
          format: uuid
          description: Unique identifier for the course
        feedback_string:
          type: string
          description: Feedback text provided by the user
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating given by the user (1-5)
        created_at:
          type: string
          format: date-time
          description: Timestamp when feedback was submitted

    FeedbackInput:
      type: object
