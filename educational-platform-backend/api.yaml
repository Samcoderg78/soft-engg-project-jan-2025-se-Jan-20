openapi: 3.0.0
info:
  title: Educational platform API Documentation
  description: API documentation for the Educational platform
  version: 1.0.0
servers:
  - url: http://localhost:3011/api
    description: Local development server
  - url: https://educational-platform-development.lawsikho.dev/api/education
    description: Stagging development server
paths:
  /user/add-user:
    post:
      summary: User Registration
      description: Register a new user in the system
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  description: User's full name
                roll_no:
                  type: string
                  description: User's roll number (optional)
                email:
                  type: string
                  format: email
                  description: User's email address
                role:
                  type: string
                  description: User's role in the system (optional)
                password:
                  type: string
                  format: password
                  description: User's password
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully!
                  data:
                    type: object
                    properties:
                      name:
                        type: string
                      roll_no:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
        '400':
          description: Bad request - Missing required fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Missing required fields
                  data:
                    type: string
                    example: ""
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error creating user
                  error:
                    type: string

  /user/login:
    post:
      summary: User Login
      description: Authenticate a user and receive a JWT token
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: User's email address
                password:
                  type: string
                  format: password
                  description: User's password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  token:
                    type: string
                    description: JWT token for authentication
                  user:
                    type: object
                    properties:
                      name:
                        type: string
                      roll_no:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
        '400':
          description: Bad request - Missing credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Email and password are required
                  data:
                    type: string
                    example: ""
        '401':
          description: Unauthorized - Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid credentials
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error logging in
                  error:
                    type: string
      