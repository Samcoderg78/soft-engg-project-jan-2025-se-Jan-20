          type: string
          format: uuid
          description: Unique identifier for the user
        course_id:
          type: string
          format: uuid
          description: Unique identifier for the course
        feedback_string:
          type: string
          description: Feedback text provided by the user
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating given by the user (1-5)


    Assignment:
